<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>$GODOT_PROJECT_NAME</title>
		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

body {
	color: white;
	background-color: black;
	overflow: hidden;
	touch-action: none;
}

#canvas {
	display: block;
	position: fixed;
	inset: 0;
	z-index: 1;
}

#canvas:focus {
	outline: none;
}

#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background-color: $GODOT_SPLASH_COLOR;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
	z-index: 2;
}

#status-splash {
	max-height: 100%;
	max-width: 100%;
	margin: auto;
}

#status-splash.show-image--false {
	display: none;
}

#status-splash.fullsize--true {
	height: 100%;
	width: 100%;
	object-fit: contain;
}

#status-splash.use-filter--false {
	image-rendering: pixelated;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	bottom: 10%;
	width: 50%;
	margin: 0 auto;
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}

/* MineWorld overlays — must live in <body>, never in <head>. */
#mw-hud {
	position: fixed;
	left: max(16px, env(safe-area-inset-left, 0px));
	top: max(16px, env(safe-area-inset-top, 0px));
	z-index: 2147483646;
	margin: 0;
	padding: 10px 12px;
	max-width: min(520px, calc(100vw - 32px));
	background: rgba(20, 22, 28, 0.88);
	color: #e8eaed;
	font: 13px/1.35 ui-monospace, Menlo, Consolas, monospace;
	white-space: pre-wrap;
	word-break: break-word;
	border-radius: 8px;
	pointer-events: none;
	box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
}

#mw-success {
	position: fixed;
	inset: 0;
	z-index: 2147483647;
	display: none;
	align-items: center;
	justify-content: center;
	flex-direction: column;
	pointer-events: none;
	background: rgba(0, 0, 0, 0.35);
	text-align: center;
}

#mw-success.show {
	display: flex;
}

#mw-success .mw-title {
	font: 900 96px/1 system-ui, -apple-system, "Segoe UI", sans-serif;
	letter-spacing: 0.08em;
	color: #5dff8a;
	text-shadow: 0 4px 24px rgba(0, 0, 0, 0.75);
}

#mw-success.fail .mw-title {
	color: #ff6b6b;
}

#mw-success .mw-sub {
	margin-top: 12px;
	font: 600 18px/1.3 system-ui, -apple-system, "Segoe UI", sans-serif;
	color: #f2f4f7;
	text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
}

#mw-seed {
	position: fixed;
	right: max(16px, env(safe-area-inset-right, 0px));
	bottom: max(16px, env(safe-area-inset-bottom, 0px));
	z-index: 2147483646;
	display: flex;
	flex-wrap: wrap;
	align-items: center;
	gap: 6px;
	padding: 8px 10px;
	max-width: min(360px, calc(100vw - 32px));
	background: rgba(20, 22, 28, 0.88);
	color: #e8eaed;
	font: 12px/1.2 ui-sans-serif, system-ui, sans-serif;
	border-radius: 8px;
	border: 1px solid #3d4450;
	pointer-events: auto;
}

#mw-seed input {
	width: 72px;
	padding: 4px 6px;
	border-radius: 4px;
	border: 1px solid #5a6270;
	background: #12151a;
	color: #e8eaed;
	font: inherit;
}

#mw-seed button {
	padding: 4px 10px;
	border-radius: 4px;
	border: 1px solid #5a6270;
	background: #2a3140;
	color: #e8eaed;
	font: inherit;
	cursor: pointer;
}

#mw-seed button:hover {
	background: #3a4254;
}

#mw-seed #mw-seed-status {
	flex-basis: 100%;
	opacity: 0.85;
	font: 11px/1.3 ui-monospace, Menlo, Consolas, monospace;
}
		</style>
		$GODOT_HEAD_INCLUDE
	</head>
	<body>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>

		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<div id="status">
			<img id="status-splash" class="$GODOT_SPLASH_CLASSES" src="$GODOT_SPLASH" alt="">
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<pre id="mw-hud">MineWorld · connecting…</pre>
		<div id="mw-success" aria-live="polite">
			<div class="mw-title">SUCCESS</div>
			<div class="mw-sub"></div>
		</div>
		<a id="mw-rec-link" href="/recordings.html" title="Recording history"
			style="position:fixed;right:16px;top:16px;z-index:2147483646;padding:8px 12px;border-radius:8px;background:rgba(20,22,28,0.88);color:#5dff8a;font:13px/1.2 ui-sans-serif,system-ui,sans-serif;text-decoration:none;border:1px solid #3d4450;">Recordings</a>
		<div id="mw-seed">
			<label for="mw-seed-input">seed</label>
			<input id="mw-seed-input" type="number" min="0" step="1" value="42">
			<button type="button" id="mw-seed-go">Regen</button>
			<button type="button" id="mw-seed-rnd">Random</button>
			<span id="mw-seed-status"></span>
		</div>

		<script src="$GODOT_URL"></script>
		<script>
const GODOT_CONFIG = $GODOT_CONFIG;
const GODOT_THREADS_ENABLED = $GODOT_THREADS_ENABLED;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const seedInput = document.getElementById('mw-seed-input');
	const seedStatus = document.getElementById('mw-seed-status');
	const seedGo = document.getElementById('mw-seed-go');
	const seedRnd = document.getElementById('mw-seed-rnd');

	function setSeedStatus(text) {
		if (seedStatus) {
			seedStatus.textContent = text || '';
		}
	}

	async function loadSeed() {
		try {
			const res = await fetch('/api/city-block');
			if (!res.ok) {
				return;
			}
			const data = await res.json();
			if (seedInput && data.seed != null) {
				seedInput.value = String(data.seed);
			}
			setSeedStatus(
				data.seed != null
					? `now seed=${data.seed} · ${data.buildings || 0} bldg · ${data.roads || 0} road`
					: ''
			);
		} catch (err) {
			console.warn('city-block status', err);
		}
	}

	async function regen(seed) {
		setSeedStatus('regenerating…');
		seedGo.disabled = true;
		seedRnd.disabled = true;
		try {
			const body = seed == null ? { seed: null } : { seed: Number(seed) };
			const res = await fetch('/api/city-block', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify(body),
			});
			const data = await res.json();
			if (!res.ok || !data.ok) {
				setSeedStatus(data.message || data.error || 'regen failed');
				return;
			}
			setSeedStatus(`ok seed=${data.seed} — reloading…`);
			// Drop shared demo room query so join gets a fresh private room + contract.
			const url = new URL(window.location.href);
			url.searchParams.delete('room');
			window.location.replace(url.toString());
		} catch (err) {
			console.error(err);
			setSeedStatus(String(err));
		} finally {
			seedGo.disabled = false;
			seedRnd.disabled = false;
		}
	}

	if (seedGo) {
		seedGo.addEventListener('click', () => regen(seedInput ? seedInput.value : 42));
	}
	if (seedRnd) {
		seedRnd.addEventListener('click', () => regen(null));
	}
	loadSeed();

	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			setStatusMode('hidden');
		}, displayFailureNotice);
	}
}());
		</script>
	</body>
</html>
