<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>$GODOT_PROJECT_NAME</title>
		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

body {
	color: white;
	background-color: black;
	overflow: hidden;
	touch-action: none;
}

#canvas {
	display: block;
	position: fixed;
	inset: 0;
	z-index: 1;
}

#canvas:focus {
	outline: none;
}

#status, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status {
	top: 0;
	bottom: 0;
	background:
		radial-gradient(ellipse at 50% 35%, #1a2740 0%, #05070c 55%, #020308 100%);
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
	z-index: 2;
}

/* Hide Godot default splash art; brand mark is #mw-boot. */
#status-splash {
	display: none !important;
}

#mw-boot {
	display: flex;
	flex-direction: column;
	align-items: center;
	gap: 10px;
	padding: 1.5rem;
	text-align: center;
	user-select: none;
}

#mw-boot .mw-boot-mark {
	font: 700 42px/1.1 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
	letter-spacing: 0.04em;
	color: #e8eef8;
	text-shadow: 0 0 40px rgba(80, 140, 220, 0.35);
}

#mw-boot .mw-boot-sub {
	font: 500 15px/1.3 ui-sans-serif, system-ui, sans-serif;
	letter-spacing: 0.18em;
	text-transform: uppercase;
	color: #7a9bb8;
}

#mw-boot-hint {
	margin-top: 4px;
	font: 13px/1.3 ui-monospace, Menlo, Consolas, monospace;
	color: #9bb4c9;
	opacity: 0.9;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	position: relative;
	left: auto;
	right: auto;
	bottom: auto;
	width: min(280px, 60vw);
	height: 6px;
	margin: 12px auto 0;
	border: none;
	border-radius: 3px;
	background: rgba(255, 255, 255, 0.12);
	overflow: hidden;
}

#status-progress::-webkit-progress-bar {
	background: rgba(255, 255, 255, 0.12);
	border-radius: 3px;
}

#status-progress::-webkit-progress-value {
	background: linear-gradient(90deg, #3d7eb8, #6ec0ff);
	border-radius: 3px;
}

#status-progress::-moz-progress-bar {
	background: linear-gradient(90deg, #3d7eb8, #6ec0ff);
	border-radius: 3px;
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}

/* UX2-v0 level fade (above game canvas, below failure notices). */
#mw-transition {
	position: fixed;
	inset: 0;
	z-index: 2147483645;
	display: flex;
	flex-direction: column;
	align-items: center;
	justify-content: center;
	gap: 10px;
	background: #05070c;
	opacity: 0;
	pointer-events: none;
	transition: opacity 0.28s ease;
}

#mw-transition.show {
	opacity: 1;
	pointer-events: auto;
}

#mw-transition .mw-tr-label {
	font: 600 18px/1.3 ui-sans-serif, system-ui, sans-serif;
	color: #d0dbe8;
	letter-spacing: 0.04em;
	min-height: 1.3em;
}

#mw-transition .mw-tr-hint {
	font: 12px/1.3 ui-sans-serif, system-ui, sans-serif;
	color: #6a7380;
	opacity: 0;
	transition: opacity 0.2s ease;
}

#mw-transition.show .mw-tr-hint {
	opacity: 1;
}

/* MineWorld overlays — must live in <body>, never in <head>. */
#mw-hud {
	position: fixed;
	left: 16px;
	top: 16px;
	z-index: 2147483646;
	margin: 0;
	padding: 10px 12px;
	max-width: min(360px, calc(100vw - 32px));
	max-height: min(36vh, calc(100vh - 32px));
	overflow: auto;
	box-sizing: border-box;
	background: rgba(20, 22, 28, 0.88);
	color: #e8eaed;
	font: 13px/1.35 ui-monospace, Menlo, Consolas, monospace;
	white-space: pre-wrap;
	word-break: break-word;
	border-radius: 8px;
	border: 1px solid #3d4450;
	pointer-events: auto;
	cursor: pointer;
	user-select: none;
	box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
	display: none; /* play: body.mw-play · hub: body.mw-hub */
}

body.mw-play #mw-hud,
body.mw-hub #mw-hud {
	display: block;
}

#mw-hud.collapsed {
	padding: 8px 12px;
	max-width: none;
	max-height: none;
	overflow: hidden;
	white-space: nowrap;
	opacity: 0.92;
	min-width: 160px;
}

/* Hub-only DOM chrome (Godot CanvasLayer clips on Web). */
#mw-hub-profile,
#mw-hub-map {
	display: none;
	position: fixed;
	z-index: 2147483646;
	box-sizing: border-box;
	background: rgba(20, 22, 28, 0.9);
	color: #e8eaed;
	font: 12px/1.35 ui-sans-serif, system-ui, sans-serif;
	border-radius: 8px;
	border: 1px solid #3d4450;
	pointer-events: auto;
	box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
}

body.mw-hub #mw-hub-profile,
body.mw-hub #mw-hub-map {
	display: block;
}

#mw-hub-profile {
	/* JS layoutHubChrome pins to #canvas; CSS is fallback only. */
	right: 16px;
	top: 16px;
	left: auto;
	bottom: auto;
	width: min(220px, calc(100vw - 32px));
	padding: 10px 12px;
	border-color: #f29b47;
}

#mw-hub-profile .mw-id {
	opacity: 0.75;
	font: 11px/1.3 ui-monospace, Menlo, Consolas, monospace;
	margin-bottom: 4px;
	word-break: break-all;
}

#mw-hub-profile input {
	width: 100%;
	margin-top: 6px;
	box-sizing: border-box;
	padding: 6px 8px;
	border-radius: 4px;
	border: 1px solid #5a6270;
	background: #12151a;
	color: #e8eaed;
	font: inherit;
}

#mw-hub-profile .mw-profile-links {
	margin-top: 8px;
	font-size: 11px;
}

#mw-hub-profile .mw-profile-links a {
	color: #6ec0ff;
	text-decoration: none;
	margin-right: 10px;
	pointer-events: auto;
}

#mw-hub-profile .mw-profile-links a:hover {
	text-decoration: underline;
}

#mw-hub-map {
	/* JS layoutHubChrome pins to #canvas; CSS is fallback only. */
	right: 16px;
	bottom: 16px;
	left: auto;
	top: auto;
	width: min(220px, calc(100vw - 32px));
	padding: 8px 10px 10px;
	border-color: #4aa3ff;
}

#mw-hub-map .mw-map-title {
	text-align: right;
	font-size: 11px;
	color: #b8d4ef;
	margin-bottom: 4px;
}

#mw-hub-map canvas {
	display: block;
	width: 100%;
	height: auto;
	aspect-ratio: 5 / 3;
	background: #0f1720;
	border-radius: 4px;
}

#mw-hub-map .mw-map-coords {
	text-align: right;
	font: 11px/1.3 ui-monospace, Menlo, Consolas, monospace;
	color: #9bb4c9;
	margin-top: 4px;
}

#mw-hub-lb {
	display: none;
	position: fixed;
	z-index: 2147483646;
	box-sizing: border-box;
	left: 16px;
	bottom: 16px;
	width: min(220px, calc(100vw - 32px));
	padding: 8px 10px 10px;
	background: rgba(20, 22, 28, 0.9);
	color: #e8eaed;
	font: 12px/1.35 ui-sans-serif, system-ui, sans-serif;
	border-radius: 8px;
	border: 1px solid #3d4450;
	border-color: #c9a227;
	pointer-events: none;
	box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
}

body.mw-hub #mw-hub-lb {
	display: block;
}

#mw-hub-lb .mw-lb-title {
	font-size: 11px;
	color: #e8d48a;
	margin-bottom: 4px;
}

#mw-hub-lb ol {
	margin: 0;
	padding-left: 1.2em;
}

#mw-hub-lb li {
	margin: 2px 0;
	font: 12px/1.35 ui-monospace, Menlo, Consolas, monospace;
}

#mw-success {
	position: fixed;
	inset: 0;
	z-index: 2147483647;
	display: none;
	align-items: center;
	justify-content: center;
	flex-direction: column;
	pointer-events: none;
	background: rgba(0, 0, 0, 0.35);
	text-align: center;
}

#mw-success.show {
	display: flex;
}

#mw-success .mw-title {
	font: 900 96px/1 system-ui, -apple-system, "Segoe UI", sans-serif;
	letter-spacing: 0.08em;
	color: #5dff8a;
	text-shadow: 0 4px 24px rgba(0, 0, 0, 0.75);
}

#mw-success.fail .mw-title {
	color: #ff6b6b;
}

#mw-success .mw-sub {
	margin-top: 12px;
	font: 600 18px/1.3 system-ui, -apple-system, "Segoe UI", sans-serif;
	color: #f2f4f7;
	text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
}

#mw-seed {
	position: fixed;
	right: max(16px, env(safe-area-inset-right, 0px));
	bottom: max(16px, env(safe-area-inset-bottom, 0px));
	z-index: 2147483646;
	display: none;
	flex-wrap: wrap;
	align-items: center;
	gap: 6px;
	padding: 8px 10px;
	max-width: min(360px, calc(100vw - 32px));
	background: rgba(20, 22, 28, 0.88);
	color: #e8eaed;
	font: 12px/1.2 ui-sans-serif, system-ui, sans-serif;
	border-radius: 8px;
	border: 1px solid #3d4450;
	pointer-events: auto;
}

#mw-seed.mw-show {
	display: flex;
}

#mw-seed input {
	width: 72px;
	padding: 4px 6px;
	border-radius: 4px;
	border: 1px solid #5a6270;
	background: #12151a;
	color: #e8eaed;
	font: inherit;
}

#mw-seed button {
	padding: 4px 10px;
	border-radius: 4px;
	border: 1px solid #5a6270;
	background: #2a3140;
	color: #e8eaed;
	font: inherit;
	cursor: pointer;
}

#mw-seed button:hover {
	background: #3a4254;
}

#mw-seed #mw-seed-status {
	flex-basis: 100%;
	opacity: 0.85;
	font: 11px/1.3 ui-monospace, Menlo, Consolas, monospace;
}

#mw-joints {
	position: fixed;
	left: max(16px, env(safe-area-inset-left, 0px));
	bottom: max(16px, env(safe-area-inset-bottom, 0px));
	z-index: 2147483646;
	display: none; /* lobby: hidden until play */
	flex-direction: column;
	gap: 4px;
	padding: 8px 10px;
	min-width: 220px;
	max-width: min(280px, calc(100vw - 32px));
	background: rgba(20, 22, 28, 0.88);
	color: #e8eaed;
	font: 12px/1.2 ui-sans-serif, system-ui, sans-serif;
	border-radius: 8px;
	border: 1px solid #3d4450;
	pointer-events: auto;
}

body.mw-play #mw-joints {
	display: flex;
}

#mw-joints .mw-j-title {
	font-weight: 600;
	margin-bottom: 2px;
}

#mw-joints label {
	display: grid;
	grid-template-columns: 88px 1fr 44px;
	align-items: center;
	gap: 6px;
}

#mw-joints input[type="range"] {
	width: 100%;
	accent-color: #5dff8a;
}

#mw-joints .mw-j-val {
	font: 11px/1 ui-monospace, Menlo, Consolas, monospace;
	opacity: 0.9;
	text-align: right;
}
		</style>
		$GODOT_HEAD_INCLUDE
	</head>
	<body>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>

		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<div id="status">
			<div id="mw-boot">
				<div class="mw-boot-mark">MineWorld</div>
		<div class="mw-boot-sub" data-i18n="boot.sub">母港</div>

				<div id="mw-boot-hint" data-i18n="boot.hint">加载中…</div>

			<img id="status-splash" class="$GODOT_SPLASH_CLASSES" src="$GODOT_SPLASH" alt="">
			<div id="status-notice"></div>
		</div>
		<div id="mw-transition" aria-hidden="true">
			<div class="mw-tr-label" id="mw-tr-label"></div>
			<div class="mw-tr-hint" data-i18n="tr.skip">Enter / 点击跳过</div>

		<pre id="mw-hud" title="Click to collapse" data-i18n="hud.connecting">MineWorld · 连接中…</pre>
		<div id="mw-hub-profile">

			<div id="mw-hub-nick-label">Guest</div>
			<input id="mw-hub-nick" type="text" maxlength="24" data-i18n="hub.nick" data-i18n-attr="placeholder" placeholder="昵称" autocomplete="off">
			<div class="mw-profile-links">
				<a href="/portal/me.html" data-i18n="hub.me">我的战绩</a>

			</div>
		</div>
		<div id="mw-hub-map">
			<div class="mw-map-title" data-i18n="hub.map">母港图 · 东A橙 · 西B蓝 · 北C · 西偏北D · 南E</div>
			<canvas id="mw-hub-map-canvas" width="220" height="132"></canvas>
			<div class="mw-map-coords" id="mw-hub-map-coords">pos --</div>
		</div>
		<div id="mw-hub-lb" aria-label="Leaderboard">
			<div class="mw-lb-title" data-i18n="hub.lb">排行榜</div>
			<ol id="mw-hub-lb-list"><li>…</li></ol>
		</div>
		<div id="mw-success" aria-live="polite">
			<div class="mw-title" data-i18n="hub.success">通关</div>
			<div class="mw-sub"></div>
			<a class="mw-me" href="/portal/me.html" style="display:none;margin-top:10px;color:#7ec8ff;font:14px/1.3 ui-sans-serif,system-ui,sans-serif;" data-i18n="hub.me_link">我的战绩 →</a>
		</div>
		<a id="mw-rec-link" href="/recordings.html" title="Recording history"
			style="display:none;position:fixed;right:16px;top:16px;z-index:2147483646;padding:8px 12px;border-radius:8px;background:rgba(20,22,28,0.88);color:#5dff8a;font:13px/1.2 ui-sans-serif,system-ui,sans-serif;text-decoration:none;border:1px solid #3d4450;">Recordings</a>
		<div id="mw-seed">
			<label for="mw-seed-input" data-i18n="hub.seed">种子</label>
			<input id="mw-seed-input" type="number" min="0" step="1" value="42">
			<button type="button" id="mw-seed-go" data-i18n="hub.regen">重生</button>
			<button type="button" id="mw-seed-rnd" data-i18n="hub.random">随机</button>
			<span id="mw-seed-status"></span>
		</div>
		<div id="mw-joints">
			<div class="mw-j-title" data-i18n="hub.joints">臂 / 爪</div>
			<label>yaw <input id="mw-j-arm_yaw" type="range" min="-2.8" max="2.8" step="0.02" value="0"><span class="mw-j-val" data-for="arm_yaw">0.00</span></label>
			<label>shoulder <input id="mw-j-arm_shoulder" type="range" min="-1.4" max="1.6" step="0.02" value="0"><span class="mw-j-val" data-for="arm_shoulder">0.00</span></label>
			<label>elbow <input id="mw-j-arm_elbow" type="range" min="-2.4" max="0.2" step="0.02" value="0"><span class="mw-j-val" data-for="arm_elbow">0.00</span></label>
			<label>gripper <input id="mw-j-gripper" type="range" min="0" max="0.05" step="0.001" value="0"><span class="mw-j-val" data-for="gripper">0.000</span></label>
		</div>

		<script src="/mw_i18n.js"></script>
		<script src="$GODOT_URL"></script>
		<script>
const GODOT_CONFIG = $GODOT_CONFIG;
const GODOT_THREADS_ENABLED = $GODOT_THREADS_ENABLED;
const engine = new Engine(GODOT_CONFIG);

(function () {
	if (window.MW_I18N) {
		window.MW_I18N.mountToggle(document.body);
	}
})();

(function () {
	/* Lobby vs play vs hub: chrome visibility. */
	window.MW_SET_SHELL_UI = function (play, hub) {
		document.body.classList.toggle('mw-play', !!play);
		document.body.classList.toggle('mw-hub', !!hub && !play);
		const rec = document.getElementById('mw-rec-link');
		if (rec) {
			rec.style.display = play ? 'block' : 'none';
		}
		if (typeof window.MW_LAYOUT_HUB_CHROME === 'function') {
			window.MW_LAYOUT_HUB_CHROME();
		}
	};

	/* UX2 / UX2b: fade overlay between Godot scenes (accent + skip hint). */
	(function setupTransition() {
		const el = document.getElementById('mw-transition');
		const lab = document.getElementById('mw-tr-label');
		if (!el) {
			return;
		}
		const baseBg = '#05070c';
		window._MW_SKIP_TRANSITION = false;
		window.MW_TRANSITION = {
			start: function (opts) {
				const label = opts && opts.label ? String(opts.label) : '';
				const accent = opts && opts.accent ? String(opts.accent) : '';
				window._MW_SKIP_TRANSITION = false;
				if (lab) {
					lab.textContent = label;
				}
				if (accent && accent.charAt(0) === '#') {
					el.style.background = 'linear-gradient(160deg, ' + accent + '55 0%, ' + baseBg + ' 55%)';
				} else {
					el.style.background = baseBg;
				}
				el.classList.add('show');
				el.setAttribute('aria-hidden', 'false');
			},
			end: function () {
				el.classList.remove('show');
				el.setAttribute('aria-hidden', 'true');
				el.style.background = baseBg;
				window._MW_SKIP_TRANSITION = false;
				if (lab) {
					lab.textContent = '';
				}
			},
		};
		el.addEventListener('click', function () {
			if (el.classList.contains('show')) {
				window._MW_SKIP_TRANSITION = true;
			}
		});
		document.addEventListener('keydown', function (ev) {
			if (!el.classList.contains('show')) {
				return;
			}
			if (ev.key === 'Enter' || ev.key === ' ') {
				window._MW_SKIP_TRANSITION = true;
			}
		});
	})();

	/* Platform auth (Phase A) — login before Hub; SQLite API on same origin. */
	window.MW_AUTH_TOKEN_KEY = 'mw_auth_token';
	window.MW_PLATFORM_AUTH_REQUIRED = true;
	window.MW_AUTH_PLAYER = null;

	window.MW_FETCH_AUTH_CONFIG = async function () {
		try {
			const r = await fetch('/api/platform/health');
			if (r.ok) {
				const d = await r.json();
				window.MW_PLATFORM_AUTH_REQUIRED = !!d.auth_enabled;
			}
		} catch (err) { /* offline dev */ }
	};

	window.MW_ENSURE_AUTH = async function () {
		await window.MW_FETCH_AUTH_CONFIG();
		const params = new URLSearchParams(location.search);
		if (params.get('menu') === '1') {
			return true;
		}
		if (!window.MW_PLATFORM_AUTH_REQUIRED) {
			return true;
		}
		const token = localStorage.getItem(window.MW_AUTH_TOKEN_KEY);
		if (!token) {
			return false;
		}
		try {
			const r = await fetch('/api/platform/me', {
				headers: { Authorization: 'Bearer ' + token },
			});
			if (!r.ok) {
				localStorage.removeItem(window.MW_AUTH_TOKEN_KEY);
				return false;
			}
			const data = await r.json();
			if (data.player) {
				window.MW_AUTH_PLAYER = data.player;
				localStorage.setItem('mw_profile', JSON.stringify({
					id: data.player.player_id,
					nickname: data.player.display_name,
					accent: data.player.accent || '#4aa3ff',
				}));
			}
			return true;
		} catch (err) {
			return false;
		}
	};

	window.MW_REDIRECT_LOGIN = function () {
		const next = encodeURIComponent(location.pathname + location.search);
		location.replace('/portal/?next=' + next);
	};

	/* Local profile card — synced from platform login when present. */
	window.MW_GET_PROFILE = function () {
		if (window.MW_AUTH_PLAYER) {
			return {
				id: window.MW_AUTH_PLAYER.player_id,
				nickname: window.MW_AUTH_PLAYER.display_name,
				accent: window.MW_AUTH_PLAYER.accent || '#4aa3ff',
			};
		}
		try {
			const raw = localStorage.getItem('mw_profile');
			if (raw) {
				const p = JSON.parse(raw);
				if (p && typeof p === 'object' && p.id && !String(p.id).startsWith('local-')) {
					return p;
				}
				if (p && typeof p === 'object') {
					return p;
				}
			}
		} catch (err) { /* ignore */ }
		const fresh = {
			id: 'local-' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36),
			nickname: 'Guest',
			accent: '#4aa3ff',
		};
		try {
			localStorage.setItem('mw_profile', JSON.stringify(fresh));
		} catch (err2) { /* ignore */ }
		return fresh;
	};
	window.MW_SET_PROFILE = function (p) {
		if (!p || typeof p !== 'object') {
			return;
		}
		const next = {
			id: String(p.id || ''),
			nickname: String(p.nickname || 'Guest').slice(0, 24),
			accent: String(p.accent || '#4aa3ff'),
		};
		if (!next.id) {
			next.id = window.MW_GET_PROFILE().id;
		}
		try {
			localStorage.setItem('mw_profile', JSON.stringify(next));
		} catch (err) { /* ignore */ }
		window.MW_PROFILE = next;
		return next;
	};

	/* Hub DOM profile + minimap (Web only; Godot HUD clips). */
	(function setupHubChrome() {
		const nickInput = document.getElementById('mw-hub-nick');
		const idEl = document.getElementById('mw-hub-id');
		const nickLabel = document.getElementById('mw-hub-nick-label');
		const canvas = document.getElementById('mw-hub-map-canvas');
		const coordsEl = document.getElementById('mw-hub-map-coords');
		const HALF_X = 40.0;
		const HALF_Y = 36.0;

		window.MW_SET_HUB_PROFILE = function (p) {
			if (!p || typeof p !== 'object') {
				return;
			}
			const id = String(p.id || '?');
			const nick = String(p.nickname || 'Guest').slice(0, 24);
			if (idEl) {
				var prefix = window.MW_I18N ? window.MW_I18N.t('hub.pilot_id') : '飞行员 · ID ';
				idEl.textContent = prefix + id.slice(0, 12);
			}
			if (nickLabel) {
				nickLabel.textContent = nick;
			}
			if (nickInput && document.activeElement !== nickInput) {
				nickInput.value = nick;
			}
		};

		if (nickInput) {
			nickInput.addEventListener('keydown', function (e) {
				e.stopPropagation();
				if (e.code === 'Enter' || e.key === 'Enter') {
					e.preventDefault();
					const nick = (nickInput.value || 'Guest').trim().slice(0, 24) || 'Guest';
					window.MW_HUB_NICK_PENDING = nick;
					nickInput.blur();
				}
			});
			nickInput.addEventListener('focus', function () {
				/* Keep game keys from fighting the input. */
			});
		}

		window.MW_SET_HUB_MAP = function (payload) {
			if (!canvas || !payload) {
				return;
			}
			const actors = Array.isArray(payload.actors) ? payload.actors : [];
			const selfTxt = payload.self || (window.MW_I18N ? window.MW_I18N.t('hub.alone') : '独自');
			if (coordsEl) {
				coordsEl.textContent = selfTxt + ' · n=' + actors.length;
			}
			const w = canvas.width;
			const h = canvas.height;
			const ctx = canvas.getContext('2d');
			if (!ctx) {
				return;
			}
			ctx.clearRect(0, 0, w, h);
			ctx.fillStyle = '#0f1720';
			ctx.fillRect(0, 0, w, h);
			const pad = 10;
			const iw = w - pad * 2;
			const ih = h - pad * 2;
			ctx.strokeStyle = 'rgba(74,163,255,0.9)';
			ctx.lineWidth = 2;
			ctx.strokeRect(pad, pad, iw, ih);
			ctx.strokeStyle = 'rgba(100,130,160,0.45)';
			ctx.beginPath();
			ctx.moveTo(pad + iw * 0.5 - 6, pad + ih * 0.5);
			ctx.lineTo(pad + iw * 0.5 + 6, pad + ih * 0.5);
			ctx.moveTo(pad + iw * 0.5, pad + ih * 0.5 - 6);
			ctx.lineTo(pad + iw * 0.5, pad + ih * 0.5 + 6);
			ctx.stroke();
			const sx = iw / (HALF_X * 2);
			const sy = ih / (HALF_Y * 2);
			function toLocal(mx, my) {
				return {
					x: pad + (mx + HALF_X) * sx,
					y: pad + (HALF_Y - my) * sy,
				};
			}
			function door(mx, my, color) {
				const p = toLocal(mx, my);
				ctx.fillStyle = color;
				ctx.fillRect(p.x - 4, p.y - 4, 8, 8);
			}
			door(HALF_X * 0.86, 0, '#ff8c28');
			door(-HALF_X * 0.86, 0, '#4db3ff');
			door(0, -HALF_Y * 0.83, '#d0dceb');
			door(-HALF_X * 0.86, -HALF_Y * 0.4, '#8ad4b0');
			door(0, HALF_Y * 0.83, '#ff7340');
			/* Mezzanine (south half) + elevator — display-only. */
			(function () {
				const a = toLocal(-HALF_X + 1, 1.2);
				const b = toLocal(HALF_X - 1, HALF_Y - 0.8);
				const x = Math.min(a.x, b.x);
				const y = Math.min(a.y, b.y);
				const rw = Math.abs(b.x - a.x);
				const rh = Math.abs(b.y - a.y);
				ctx.fillStyle = 'rgba(90,140,190,0.18)';
				ctx.fillRect(x, y, rw, rh);
				ctx.strokeStyle = 'rgba(120,180,230,0.45)';
				ctx.lineWidth = 1;
				ctx.strokeRect(x, y, rw, rh);
			})();
			door(13.5, 12.5, '#66e0ff');
			actors.forEach(function (a) {
				const p = toLocal(Number(a.x) || 0, Number(a.y) || 0);
				const isSelf = !!a.is_self;
				ctx.beginPath();
				ctx.fillStyle = isSelf ? '#ffd84a' : '#73d7ff';
				ctx.arc(p.x, p.y, isSelf ? 5 : 4, 0, Math.PI * 2);
				ctx.fill();
				if (isSelf) {
					ctx.strokeStyle = 'rgba(255,255,255,0.7)';
					ctx.lineWidth = 1.2;
					ctx.beginPath();
					ctx.arc(p.x, p.y, 7, 0, Math.PI * 2);
					ctx.stroke();
				}
			});
		};

		window.MW_SET_HUB_PROFILE(window.MW_GET_PROFILE());

		async function refreshLeaderboard() {
			const list = document.getElementById('mw-hub-lb-list');
			if (!list) {
				return;
			}
			try {
				const r = await fetch('/api/platform/leaderboard');
				const data = await r.json();
				const entries = (data && data.entries) || [];
				list.innerHTML = '';
				if (!entries.length) {
					const li = document.createElement('li');
					li.textContent = 'No scores yet';
					list.appendChild(li);
					return;
				}
				entries.slice(0, 8).forEach(function (e) {
					const li = document.createElement('li');
					const name = String(e.display_name || e.player_id || '?').slice(0, 14);
					li.textContent = name + ' · ' + String(e.total_points || 0);
					list.appendChild(li);
				});
			} catch (err) {
				list.innerHTML = '<li>—</li>';
			}
		}
		window.MW_REFRESH_LEADERBOARD = refreshLeaderboard;
		refreshLeaderboard();
		setInterval(refreshLeaderboard, 15000);

		function layoutHubChrome() {
			const canvas = document.getElementById('canvas');
			const hud = document.getElementById('mw-hud');
			const profile = document.getElementById('mw-hub-profile');
			const map = document.getElementById('mw-hub-map');
			const lb = document.getElementById('mw-hub-lb');
			if (!canvas || !document.body.classList.contains('mw-hub')) {
				return;
			}
			const r = canvas.getBoundingClientRect();
			const pad = 12;
			if (hud) {
				hud.style.left = Math.max(pad, r.left + pad) + 'px';
				hud.style.top = Math.max(pad, r.top + pad) + 'px';
				hud.style.right = 'auto';
				hud.style.bottom = 'auto';
				hud.style.maxWidth = Math.min(360, Math.max(120, r.width - pad * 2)) + 'px';
			}
			if (profile) {
				const pw = Math.min(220, Math.max(140, r.width * 0.28));
				profile.style.width = pw + 'px';
				profile.style.left = (r.right - pad - pw) + 'px';
				profile.style.top = Math.max(pad, r.top + pad) + 'px';
				profile.style.right = 'auto';
				profile.style.bottom = 'auto';
			}
			if (map) {
				const mw = Math.min(220, Math.max(140, r.width * 0.28));
				map.style.width = mw + 'px';
				map.style.left = (r.right - pad - mw) + 'px';
				map.style.top = 'auto';
				map.style.right = 'auto';
				map.style.bottom = 'auto';
				const mh = map.offsetHeight || 160;
				map.style.top = Math.max(pad, r.bottom - pad - mh) + 'px';
			}
			if (lb) {
				const lw = Math.min(220, Math.max(140, r.width * 0.28));
				lb.style.width = lw + 'px';
				lb.style.left = Math.max(pad, r.left + pad) + 'px';
				lb.style.right = 'auto';
				lb.style.top = 'auto';
				lb.style.bottom = 'auto';
				const lh = lb.offsetHeight || 120;
				lb.style.top = Math.max(pad, r.bottom - pad - lh) + 'px';
			}
		}
		window.MW_LAYOUT_HUB_CHROME = layoutHubChrome;
		window.addEventListener('resize', layoutHubChrome);
		setInterval(layoutHubChrome, 500);
		layoutHubChrome();
	})();

	/* Click #mw-hud to collapse / expand; Godot calls MW_SET_HUD each frame. */
	(function setupHudCollapse() {
		const el = document.getElementById('mw-hud');
		if (!el) {
			return;
		}
		let collapsed = false;
		let fullText = el.textContent || '';
		try {
			collapsed = localStorage.getItem('mw-hud-collapsed') === '1';
		} catch (err) { /* ignore */ }

		function render() {
			if (collapsed) {
				el.textContent = el.dataset.collapsedLabel || (window.MW_I18N ? window.MW_I18N.t('boot.sub') + ' · tips ›' : '母港 · 提示 ›（点击）');
				el.classList.add('collapsed');
				el.title = 'Click to expand';
			} else {
				el.textContent = fullText || (window.MW_I18N ? window.MW_I18N.t('hud.connecting') : 'MineWorld · 连接中…');
				el.classList.remove('collapsed');
				el.title = 'Click to collapse';
			}
		}

		window.MW_SET_HUD = function (t, collapsedLabel) {
			if (collapsedLabel != null && collapsedLabel !== '') {
				el.dataset.collapsedLabel = String(collapsedLabel);
			}
			fullText = t == null ? '' : String(t);
			render();
		};

		el.addEventListener('click', function () {
			collapsed = !collapsed;
			try {
				localStorage.setItem('mw-hud-collapsed', collapsed ? '1' : '0');
			} catch (err) { /* ignore */ }
			render();
		});
		render();
	})();

	window.MW_JOINT_TARGETS = {
		arm_yaw: 0,
		arm_shoulder: 0,
		arm_elbow: 0,
		gripper: 0,
	};
	const jointIds = ['arm_yaw', 'arm_shoulder', 'arm_elbow', 'gripper'];
	jointIds.forEach(function (id) {
		const input = document.getElementById('mw-j-' + id);
		const valEl = document.querySelector('.mw-j-val[data-for="' + id + '"]');
		if (!input) {
			return;
		}
		const sync = function () {
			const v = Number(input.value);
			window.MW_JOINT_TARGETS[id] = v;
			if (valEl) {
				valEl.textContent = id === 'gripper' ? v.toFixed(3) : v.toFixed(2);
			}
		};
		input.addEventListener('input', sync);
		sync();
	});

	const seedInput = document.getElementById('mw-seed-input');
	const seedStatus = document.getElementById('mw-seed-status');
	const seedGo = document.getElementById('mw-seed-go');
	const seedRnd = document.getElementById('mw-seed-rnd');

	function setSeedStatus(text) {
		if (seedStatus) {
			seedStatus.textContent = text || '';
		}
	}

	async function loadSeed() {
		try {
			const res = await fetch('/api/city-block');
			if (!res.ok) {
				return;
			}
			const data = await res.json();
			if (seedInput && data.seed != null) {
				seedInput.value = String(data.seed);
			}
			setSeedStatus(
				data.seed != null
					? `now seed=${data.seed} · ${data.buildings || 0} bldg · ${data.roads || 0} road`
					: ''
			);
		} catch (err) {
			console.warn('city-block status', err);
		}
	}

	async function regen(seed) {
		setSeedStatus('regenerating…');
		seedGo.disabled = true;
		seedRnd.disabled = true;
		try {
			const body = seed == null ? { seed: null } : { seed: Number(seed) };
			const res = await fetch('/api/city-block', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify(body),
			});
			const data = await res.json();
			if (!res.ok || !data.ok) {
				setSeedStatus(data.message || data.error || 'regen failed');
				return;
			}
			setSeedStatus(`ok seed=${data.seed} — reloading…`);
			// Drop shared demo room query so join gets a fresh private room + contract.
			const url = new URL(window.location.href);
			url.searchParams.delete('room');
			window.location.replace(url.toString());
		} catch (err) {
			console.error(err);
			setSeedStatus(String(err));
		} finally {
			seedGo.disabled = false;
			seedRnd.disabled = false;
		}
	}

	if (seedGo) {
		seedGo.addEventListener('click', () => regen(seedInput ? seedInput.value : 42));
	}
	if (seedRnd) {
		seedRnd.addEventListener('click', () => regen(null));
	}
	loadSeed();

	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');
	const bootHint = document.getElementById('mw-boot-hint');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		if (bootHint) {
			bootHint.style.display = mode === 'notice' ? 'none' : 'block';
			if (mode === 'progress') {
				bootHint.textContent = 'Loading engine…';
			}
		}
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		(async function () {
			const authed = await window.MW_ENSURE_AUTH();
			if (!authed) {
				window.MW_REDIRECT_LOGIN();
				return;
			}
			window.MW_PROFILE = window.MW_GET_PROFILE();
			setStatusMode('progress');
			engine.startGame({
				'onProgress': function (current, total) {
					if (current > 0 && total > 0) {
						statusProgress.value = current;
						statusProgress.max = total;
					} else {
						statusProgress.removeAttribute('value');
						statusProgress.removeAttribute('max');
					}
				},
			}).then(() => {
				setStatusMode('hidden');
			}, displayFailureNotice);
		})();
	}
}());
		</script>
