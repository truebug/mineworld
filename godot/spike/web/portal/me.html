<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>MineWorld · My record</title>
	<style>
		* { box-sizing: border-box; }
		body {
			margin: 0;
			min-height: 100vh;
			padding: 24px 16px 40px;
			background: radial-gradient(ellipse at 50% 20%, #1a2740 0%, #05070c 55%, #020308 100%);
			color: #e8eef8;
			font: 15px/1.4 ui-sans-serif, system-ui, -apple-system, sans-serif;
		}
		.wrap { max-width: 560px; margin: 0 auto; }
		h1 { margin: 0 0 4px; font-size: 26px; letter-spacing: 0.04em; }
		.sub { margin: 0 0 20px; color: #7a9bb8; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; }
		.card {
			background: rgba(20, 22, 28, 0.92);
			border: 1px solid #3d4450;
			border-radius: 12px;
			padding: 16px 18px;
			margin-bottom: 14px;
		}
		.stats { display: flex; gap: 16px; flex-wrap: wrap; }
		.stat strong { display: block; font-size: 22px; color: #e8d48a; }
		.stat span { font-size: 12px; color: #9bb4c9; }
		table { width: 100%; border-collapse: collapse; font: 12px/1.4 ui-monospace, Menlo, Consolas, monospace; }
		th, td { text-align: left; padding: 6px 4px; border-bottom: 1px solid #2a3038; }
		th { color: #7a9bb8; font-weight: 500; }
		td a { color: #6ec0ff; text-decoration: none; margin-right: 8px; font-size: 11px; }
		td a:hover { text-decoration: underline; }
		td .muted { color: #5a6270; font-size: 11px; }
		.nav { margin-top: 8px; display: flex; gap: 12px; flex-wrap: wrap; }
		.nav a {
			color: #6ec0ff;
			text-decoration: none;
			font-size: 14px;
		}
		.nav a:hover { text-decoration: underline; }
		.err { color: #ff8a8a; }
		button {
			padding: 6px 12px;
			border-radius: 6px;
			border: 1px solid #5a6270;
			background: #2a3140;
			color: #e8eaed;
			font: inherit;
			cursor: pointer;
		}
	</style>
</head>
<body>
	<div class="wrap">
		<h1>My record</h1>
		<p class="sub" id="who">Loading…</p>
		<div class="card stats" id="stats">
			<div class="stat"><strong id="s-pts">—</strong><span>Total points</span></div>
			<div class="stat"><strong id="s-runs">—</strong><span>Scored runs</span></div>
			<div class="stat"><strong id="s-wins">—</strong><span>Success</span></div>
		</div>
		<div class="card">
			<div style="margin-bottom:8px;color:#9bb4c9;font-size:12px;">Recent sessions</div>
			<table>
				<thead><tr><th>Level</th><th>Pts</th><th>Time</th><th>When</th><th>Replay</th></tr></thead>
				<tbody id="rows"><tr><td colspan="5">…</td></tr></tbody>
			</table>
		</div>
		<div class="nav">
			<a href="/">← Back to Hub</a>
			<a href="/recordings.html">Recordings</a>
			<button type="button" id="logout">Sign out</button>
		</div>
		<p class="err" id="err"></p>
	</div>
	<script>
	(function () {
		const TOKEN_KEY = 'mw_auth_token';
		const token = localStorage.getItem(TOKEN_KEY);
		if (!token) {
			location.replace('/portal/login.html?next=' + encodeURIComponent('/portal/me.html'));
			return;
		}
		fetch('/api/platform/me', { headers: { Authorization: 'Bearer ' + token } })
			.then(function (r) {
				if (r.status === 401) {
					localStorage.removeItem(TOKEN_KEY);
					location.replace('/portal/login.html?next=/portal/me.html');
					return null;
				}
				return r.json();
			})
			.then(function (data) {
				if (!data) return;
				if (!data.ok) {
					document.getElementById('err').textContent = data.error || 'Failed';
					return;
				}
				const p = data.player || {};
				document.getElementById('who').textContent =
					(p.display_name || p.player_id || '?') + ' · ' + (p.player_id || '');
				const st = data.stats || {};
				document.getElementById('s-pts').textContent = String(st.total_points || 0);
				document.getElementById('s-runs').textContent = String(st.runs || 0);
				document.getElementById('s-wins').textContent = String(st.wins || 0);
				const tbody = document.getElementById('rows');
				tbody.innerHTML = '';
				const scores = data.scores || [];
				if (!scores.length) {
					tbody.innerHTML = '<tr><td colspan="5">No scored runs yet — clear Workshop or Training.</td></tr>';
					return;
				}
				scores.forEach(function (s) {
					const tr = document.createElement('tr');
					const when = String(s.created_at || '').replace('T', ' ').slice(0, 16);
					const sid = String(s.session_id || '');
					tr.innerHTML =
						'<td>' + String(s.level_id || '') + '</td>' +
						'<td>' + String(s.points || 0) + '</td>' +
						'<td>' + Number(s.duration_sim_s || 0).toFixed(1) + 's</td>' +
						'<td>' + when + '</td>' +
						'<td class="replay-cell" data-sid="' + sid.replace(/"/g, '') + '">' +
						'<span class="chk">…</span></td>';
					tbody.appendChild(tr);
				});
				tbody.querySelectorAll('.replay-cell').forEach(function (cell) {
					const sid = cell.getAttribute('data-sid');
					if (!sid) {
						cell.innerHTML = '—';
						return;
					}
					fetch('/api/recordings/' + encodeURIComponent(sid))
						.then(function (r) {
							if (!r.ok) {
								cell.innerHTML = '<span class="muted" title="No frames on disk">no rec</span>';
								return;
							}
							// TODO(R3): 3D /?replay= disabled until offline puppet is reliable
							cell.innerHTML =
								'<a href="/recordings.html?session=' + encodeURIComponent(sid) + '">2D</a>' +
								'<span class="muted" title="TODO R3: 3D offline replay">3D soon</span>';
						})
						.catch(function () {
							cell.innerHTML = '<span class="muted">—</span>';
						});
				});
			})
			.catch(function (e) {
				document.getElementById('err').textContent = String(e);
			});

		document.getElementById('logout').addEventListener('click', function () {
			const t = localStorage.getItem(TOKEN_KEY);
			fetch('/api/platform/logout', {
				method: 'POST',
				headers: t ? { Authorization: 'Bearer ' + t } : {},
			}).finally(function () {
				localStorage.removeItem(TOKEN_KEY);
				location.replace('/portal/login.html');
			});
		});
	})();
	</script>
</body>
</html>
