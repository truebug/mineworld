<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>MineWorld · Profile</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
	<script src="/mw_i18n.js"></script>
	<style>
		:root {
			--void: #03050a;
			--ink: #e6edf5;
			--muted: #7d8fa3;
			--line: #3d4450;
			--accent: #d4a24c;
			--panel: rgba(20, 22, 28, 0.92);
			--link: #6ec0ff;
		}
		* { box-sizing: border-box; }
		body {
			margin: 0;
			min-height: 100vh;
			padding: 28px 16px 48px;
			background:
				radial-gradient(ellipse at 50% 0%, #1a2740 0%, transparent 50%),
				linear-gradient(180deg, #0a1018 0%, var(--void) 100%);
			color: var(--ink);
			font: 15px/1.45 "IBM Plex Sans", system-ui, sans-serif;
		}
		.wrap { max-width: 560px; margin: 0 auto; }
		.brand {
			margin: 0 0 2px;
			font-family: Syne, sans-serif;
			font-weight: 800;
			font-size: 28px;
			letter-spacing: -0.02em;
			text-transform: uppercase;
		}
		.sub {
			margin: 0 0 22px;
			color: var(--muted);
			font-size: 12px;
			letter-spacing: 0.14em;
			text-transform: uppercase;
		}
		.cta-row { margin-bottom: 18px; }
		.btn-enter {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			width: 100%;
			padding: 16px 20px;
			border: none;
			border-radius: 2px;
			background: var(--accent);
			color: #140f06;
			font-family: Syne, sans-serif;
			font-weight: 700;
			font-size: 1rem;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			text-decoration: none;
			transition: background 0.15s ease, transform 0.15s ease;
		}
		.btn-enter:hover { background: #e0b35c; transform: translateY(-1px); }
		.card {
			background: var(--panel);
			border: 1px solid var(--line);
			border-radius: 10px;
			padding: 16px 18px;
			margin-bottom: 14px;
		}
		.card h2 {
			margin: 0 0 12px;
			font-family: Syne, sans-serif;
			font-size: 13px;
			font-weight: 700;
			letter-spacing: 0.12em;
			text-transform: uppercase;
			color: var(--muted);
		}
		.stats { display: flex; gap: 16px; flex-wrap: wrap; }
		.stat strong { display: block; font-size: 22px; color: var(--accent); font-family: Syne, sans-serif; }
		.stat span { font-size: 12px; color: var(--muted); }
		ol.lb {
			margin: 0;
			padding: 0;
			list-style: none;
			font: 13px/1.4 ui-monospace, Menlo, Consolas, monospace;
		}
		ol.lb li {
			display: flex;
			justify-content: space-between;
			gap: 12px;
			padding: 8px 0;
			border-bottom: 1px solid #2a3038;
		}
		ol.lb li:last-child { border-bottom: none; }
		ol.lb .rank { color: var(--muted); min-width: 1.5em; }
		ol.lb .name { flex: 1; color: var(--ink); }
		ol.lb .pts { color: var(--accent); font-weight: 600; }
		table { width: 100%; border-collapse: collapse; font: 12px/1.4 ui-monospace, Menlo, Consolas, monospace; }
		th, td { text-align: left; padding: 6px 4px; border-bottom: 1px solid #2a3038; }
		th { color: var(--muted); font-weight: 500; }
		td a { color: var(--link); text-decoration: none; margin-right: 8px; font-size: 11px; }
		td a:hover { text-decoration: underline; }
		td .muted { color: #5a6270; font-size: 11px; }
		.nav { margin-top: 10px; display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
		.nav a { color: var(--link); text-decoration: none; font-size: 14px; }
		.nav a:hover { text-decoration: underline; }
		.err { color: #ff8a8a; min-height: 1.2em; }
		button.ghost {
			padding: 6px 12px;
			border-radius: 6px;
			border: 1px solid #5a6270;
			background: #2a3140;
			color: #e8eaed;
			font: inherit;
			cursor: pointer;
		}
	</style>
</head>
<body>
	<div class="wrap">
		<h1 class="brand">MineWorld</h1>
		<p class="sub" id="who" data-i18n="me.loading">加载中…</p>
		<div class="cta-row">
			<a class="btn-enter" href="/" data-i18n="me.enter">进入母港</a>
		</div>
		<div class="card stats" id="stats">
			<div class="stat"><strong id="s-pts">—</strong><span data-i18n="me.pts">总积分</span></div>
			<div class="stat"><strong id="s-runs">—</strong><span data-i18n="me.runs">计分局数</span></div>
			<div class="stat"><strong id="s-wins">—</strong><span data-i18n="me.wins">通关次数</span></div>
		</div>
		<div class="card">
			<h2 data-i18n="me.lb">排行榜</h2>
			<div class="cta-row" style="margin-bottom:10px;gap:8px;flex-wrap:wrap">
				<button type="button" class="ghost lb-tab" data-level="" data-i18n="me.lb_all">总榜</button>
				<button type="button" class="ghost lb-tab" data-level="demo_workshop">工坊</button>
				<button type="button" class="ghost lb-tab" data-level="demo_city">训练场</button>
			</div>
			<ol class="lb" id="lb"><li data-i18n="me.loading">加载中…</li></ol>
		</div>
		<div class="card">
			<h2 data-i18n="me.sessions">最近对局</h2>
			<table>
				<thead><tr>
					<th data-i18n="me.th.level">关卡</th>
					<th data-i18n="me.th.pts">分</th>
					<th data-i18n="me.th.time">时长</th>
					<th data-i18n="me.th.when">时间</th>
					<th data-i18n="me.th.replay">回放</th>
				</tr></thead>
				<tbody id="rows"><tr><td colspan="5">…</td></tr></tbody>
			</table>
		</div>
		<div class="nav">
			<a href="/portal/" data-i18n="me.landing">← 首页</a>
			<a href="/recordings.html" data-i18n="me.recordings">录制</a>
			<a id="il-export" href="/api/recordings/export.csv?level_id=demo_workshop&amp;task_id=obj_place_block&amp;outcome=success" data-i18n="me.il_export">导出工坊 IL CSV</a>
			<button type="button" class="ghost" id="logout" data-i18n="me.logout">退出登录</button>
		</div>
		<p class="err" id="err"></p>
	</div>
	<script>
	(function () {
		if (window.MW_I18N) {
			window.MW_I18N.mountToggle(document.body);
		}
		function t(k) {
			return window.MW_I18N ? window.MW_I18N.t(k) : k;
		}
		const TOKEN_KEY = 'mw_auth_token';
		const token = localStorage.getItem(TOKEN_KEY);
		if (!token) {
			location.replace('/portal/login.html?next=' + encodeURIComponent('/portal/me.html'));
			return;
		}

		function esc(s) {
			return String(s)
				.replace(/&/g, '&amp;')
				.replace(/</g, '&lt;')
				.replace(/>/g, '&gt;')
				.replace(/"/g, '&quot;');
		}

		fetch('/api/platform/me', { headers: { Authorization: 'Bearer ' + token } })
			.then(function (r) {
				if (r.status === 401) {
					localStorage.removeItem(TOKEN_KEY);
					location.replace('/portal/login.html?next=/portal/me.html');
					return null;
				}
				return r.json();
			})
			.then(function (data) {
				if (!data) return;
				if (!data.ok) {
					document.getElementById('err').textContent = data.error || t('me.fail');
					return;
				}
				const p = data.player || {};
				document.getElementById('who').textContent =
					(p.display_name || p.player_id || '?') + ' · ' + (p.player_id || '');
				const il = document.getElementById('il-export');
				if (il && p.player_id) {
					il.href =
						'/api/recordings/export.csv?level_id=demo_workshop&task_id=obj_place_block&outcome=success&player_id=' +
						encodeURIComponent(p.player_id);
				}
				const st = data.stats || {};
				document.getElementById('s-pts').textContent = String(st.total_points || 0);
				document.getElementById('s-runs').textContent = String(st.runs || 0);
				document.getElementById('s-wins').textContent = String(st.wins || 0);
				const tbody = document.getElementById('rows');
				tbody.innerHTML = '';
				const scores = data.scores || [];
				if (!scores.length) {
					tbody.innerHTML = '<tr><td colspan="5">' + esc(t('me.empty_scores')) + '</td></tr>';
				} else {
					scores.forEach(function (s) {
						const tr = document.createElement('tr');
						const when = String(s.created_at || '').replace('T', ' ').slice(0, 16);
						const sid = String(s.session_id || '');
						tr.innerHTML =
							'<td>' + esc(s.level_id || '') + '</td>' +
							'<td>' + esc(s.points || 0) + '</td>' +
							'<td>' + Number(s.duration_sim_s || 0).toFixed(1) + 's</td>' +
							'<td>' + esc(when) + '</td>' +
							'<td class="replay-cell" data-sid="' + esc(sid) + '">' +
							'<span class="chk">…</span></td>';
						tbody.appendChild(tr);
					});
					tbody.querySelectorAll('.replay-cell').forEach(function (cell) {
						const sid = cell.getAttribute('data-sid');
						if (!sid) {
							cell.innerHTML = '—';
							return;
						}
						fetch('/api/recordings/' + encodeURIComponent(sid))
							.then(function (r) {
								if (!r.ok) {
									cell.innerHTML = '<span class="muted" title="No frames on disk">' + esc(t('me.no_rec')) + '</span>';
									return;
								}
								cell.innerHTML =
									'<a href="/recordings.html?session=' + encodeURIComponent(sid) + '">2D</a>' +
									'<a href="/?replay=' + encodeURIComponent(sid) + '">3D</a>';
							})
							.catch(function () {
								cell.innerHTML = '<span class="muted">—</span>';
							});
					});
				}
			})
			.catch(function (e) {
				document.getElementById('err').textContent = String(e);
			});

		fetch('/api/platform/leaderboard')
			.then(function (r) { return r.json(); })
			.then(function (data) {
				renderLb(data);
			})
			.catch(function () {
				document.getElementById('lb').innerHTML = '<li>' + esc(t('me.lb_fail')) + '</li>';
			});

		function renderLb(data) {
			const ol = document.getElementById('lb');
			ol.innerHTML = '';
			const entries = (data && data.entries) || [];
			if (!entries.length) {
				ol.innerHTML = '<li><span class="name">' + esc(t('me.empty_lb')) + '</span></li>';
				return;
			}
			entries.slice(0, 10).forEach(function (e, i) {
				const li = document.createElement('li');
				const name = e.display_name || e.player_id || '?';
				let pts = String(e.total_points || 0);
				if (e.best_duration_sim_s != null && e.best_duration_sim_s !== '') {
					pts += ' · ' + Number(e.best_duration_sim_s).toFixed(1) + 's';
				}
				li.innerHTML =
					'<span class="rank">' + (i + 1) + '.</span>' +
					'<span class="name">' + esc(name) + '</span>' +
					'<span class="pts">' + esc(pts) + '</span>';
				ol.appendChild(li);
			});
		}

		document.querySelectorAll('.lb-tab').forEach(function (btn) {
			btn.addEventListener('click', function () {
				const level = btn.getAttribute('data-level') || '';
				const q = level ? ('?level_id=' + encodeURIComponent(level)) : '';
				fetch('/api/platform/leaderboard' + q)
					.then(function (r) { return r.json(); })
					.then(renderLb)
					.catch(function () {
						document.getElementById('lb').innerHTML = '<li>' + esc(t('me.lb_fail')) + '</li>';
					});
			});
		});

		document.getElementById('logout').addEventListener('click', function () {
			const tok = localStorage.getItem(TOKEN_KEY);
			fetch('/api/platform/logout', {
				method: 'POST',
				headers: tok ? { Authorization: 'Bearer ' + tok } : {},
			}).finally(function () {
				localStorage.removeItem(TOKEN_KEY);
				location.replace('/portal/');
			});
		});
	})();
	</script>
</body>
</html>
