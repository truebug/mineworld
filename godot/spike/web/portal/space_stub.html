<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>MineWorld · Space card</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
	<style>
		:root {
			--void: #03050a;
			--ink: #e6edf5;
			--muted: #7d8fa3;
			--accent: #d4a24c;
			--link: #6ec0ff;
		}
		* { box-sizing: border-box; }
		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			padding: 24px;
			background:
				radial-gradient(ellipse at 40% 20%, #1a3048 0%, transparent 55%),
				linear-gradient(180deg, #0a1018 0%, var(--void) 100%);
			color: var(--ink);
			font: 16px/1.5 "IBM Plex Sans", system-ui, sans-serif;
		}
		.card { max-width: 440px; width: 100%; }
		.brand {
			margin: 0 0 8px;
			font-family: Syne, sans-serif;
			font-weight: 800;
			font-size: 13px;
			letter-spacing: 0.14em;
			text-transform: uppercase;
			color: var(--accent);
		}
		h1 {
			margin: 0 0 12px;
			font-family: Syne, sans-serif;
			font-weight: 800;
			font-size: clamp(1.6rem, 4vw, 2rem);
			letter-spacing: -0.02em;
			line-height: 1.15;
		}
		p { margin: 0 0 10px; color: var(--muted); }
		.meta {
			margin: 18px 0 28px;
			font-size: 13px;
			color: var(--muted);
			font-family: ui-monospace, monospace;
			word-break: break-all;
		}
		.actions { display: flex; flex-wrap: wrap; gap: 12px; }
		a.btn {
			display: inline-block;
			padding: 12px 18px;
			border-radius: 2px;
			text-decoration: none;
			font-weight: 600;
			font-size: 14px;
		}
		a.primary { background: var(--accent); color: #1a1208; }
		a.ghost { border: 1px solid #3d4450; color: var(--link); }
	</style>
</head>
<body>
	<main class="card">
		<p class="brand">MineWorld · PMS Space card</p>
		<h1 id="title">Space</h1>
		<p>Open the live Space enter URL (PMS / spaces.databall.tech), or return to the hangar with <code>space_id</code> so workshop recordings attribute correctly (E3).</p>
		<p class="meta" id="meta"></p>
		<div class="actions">
			<a class="btn primary" id="enter" href="#" target="_blank" rel="noopener noreferrer">Open live Space</a>
			<a class="btn ghost" id="hangar" href="/">Back to hangar</a>
			<a class="btn ghost" id="play" href="/">Hangar + space_id</a>
		</div>
	</main>
	<script>
		(function () {
			var q = new URLSearchParams(location.search);
			var id = q.get("id") || "unknown";
			var title = q.get("title") || "Space card";
			var spaceId = q.get("space_id") || "";
			var enter = q.get("enter") || "";
			document.getElementById("title").textContent = title;
			document.getElementById("meta").textContent =
				"kind=pms_space · exhibit=" + id +
				(spaceId ? (" · space_id=" + spaceId) : "") +
				(enter ? (" · enter=" + enter) : "");
			document.title = "MineWorld · " + title;
			var enterBtn = document.getElementById("enter");
			if (enter) {
				enterBtn.href = enter;
			} else {
				enterBtn.style.display = "none";
			}
			var hangar = "/";
			var attributed = spaceId ? ("/?space_id=" + encodeURIComponent(spaceId)) : "/";
			document.getElementById("hangar").href = hangar;
			document.getElementById("play").href = attributed;
			document.getElementById("play").textContent = spaceId
				? "Hangar with space_id"
				: "Back to hangar";
		})();
	</script>
</body>
</html>
