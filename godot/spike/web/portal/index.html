<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>MineWorld</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
	<script src="/mw_i18n.js"></script>
	<style>
		:root {
			--void: #03050a;
			--ink: #e6edf5;
			--muted: #7d8fa3;
			--line: rgba(180, 200, 220, 0.14);
			--accent: #d4a24c;
			--accent-dim: #8a6a2e;
			--panel: rgba(10, 14, 22, 0.72);
		}
		* { box-sizing: border-box; }
		html, body { height: 100%; }
		body {
			margin: 0;
			min-height: 100vh;
			color: var(--ink);
			font-family: "IBM Plex Sans", system-ui, sans-serif;
			background: var(--void);
			overflow-x: hidden;
		}
		.stage {
			position: relative;
			min-height: 100vh;
			display: flex;
			flex-direction: column;
			justify-content: flex-end;
			padding: clamp(24px, 5vw, 56px);
			background:
				radial-gradient(ellipse 90% 60% at 70% 18%, rgba(70, 110, 160, 0.18) 0%, transparent 55%),
				radial-gradient(ellipse 50% 40% at 12% 88%, rgba(212, 162, 76, 0.07) 0%, transparent 50%),
				linear-gradient(165deg, #0a1018 0%, var(--void) 45%, #010205 100%);
		}
		.sky {
			position: absolute;
			inset: 0;
			width: 100%;
			height: 100%;
			pointer-events: none;
			z-index: 0;
			overflow: hidden;
		}
		.sky svg {
			display: block;
			width: 100%;
			height: 100%;
		}
		.sky .star {
			fill: #e8f0ff;
			transform-box: fill-box;
			transform-origin: center;
			animation: twinkle var(--d, 4s) ease-in-out var(--delay, 0s) infinite;
		}
		.sky .star.dim { fill: #9eb0c8; opacity: 0.55; }
		.sky .star.warm { fill: #e8d4a8; }
		.sky .layer-far { animation: drift-y 90s linear infinite; }
		.sky .layer-near { animation: drift-y 55s linear infinite reverse; }
		.sky .shoot {
			stroke: #c8d8f0;
			stroke-width: 1.2;
			stroke-linecap: round;
			opacity: 0;
			animation: shoot 9s ease-in-out infinite;
		}
		.sky .shoot.b { animation-delay: 4.2s; animation-duration: 11s; }
		@keyframes twinkle {
			0%, 100% { opacity: 0.25; transform: scale(0.85); }
			50% { opacity: 1; transform: scale(1.15); }
		}
		@keyframes drift-y {
			from { transform: translateY(0); }
			to { transform: translateY(-2.5%); }
		}
		@keyframes shoot {
			0%, 78% { opacity: 0; stroke-dashoffset: 40; }
			82% { opacity: 0.85; }
			90% { opacity: 0; stroke-dashoffset: -120; }
			100% { opacity: 0; }
		}
		.stage::after {
			content: "";
			position: absolute;
			inset: 0;
			z-index: 0;
			background:
				repeating-linear-gradient(
					90deg,
					transparent 0,
					transparent 79px,
					rgba(255,255,255,0.015) 80px
				);
			pointer-events: none;
			mask-image: linear-gradient(to top, black 0%, transparent 70%);
		}
		@media (prefers-reduced-motion: reduce) {
			.sky .star, .sky .layer-far, .sky .layer-near, .sky .shoot { animation: none !important; }
			.sky .star { opacity: 0.7; }
			.hero > * { animation: none !important; opacity: 1 !important; transform: none !important; }
		}
		.hero {
			position: relative;
			z-index: 1;
			max-width: 42rem;
		}
		.brand {
			margin: 0 0 12px;
			font-family: Syne, sans-serif;
			font-weight: 800;
			font-size: clamp(3.2rem, 12vw, 5.5rem);
			line-height: 0.92;
			letter-spacing: -0.03em;
			text-transform: uppercase;
			opacity: 0;
			transform: translateY(18px);
			animation: rise 0.7s ease 0.05s forwards;
		}
		.brand span {
			display: block;
			color: var(--accent);
			font-size: 0.38em;
			letter-spacing: 0.28em;
			font-weight: 600;
			margin-bottom: 0.35em;
		}
		.lede {
			margin: 0 0 28px;
			max-width: 28rem;
			font-size: clamp(1rem, 2.4vw, 1.15rem);
			line-height: 1.45;
			color: var(--muted);
			opacity: 0;
			transform: translateY(14px);
			animation: rise 0.7s ease 0.18s forwards;
		}
		.ctas {
			display: flex;
			flex-wrap: wrap;
			gap: 12px;
			align-items: center;
			opacity: 0;
			transform: translateY(14px);
			animation: rise 0.7s ease 0.32s forwards;
		}
		@keyframes rise {
			to { opacity: 1; transform: translateY(0); }
		}
		.btn {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			padding: 14px 22px;
			border-radius: 2px;
			font-family: Syne, sans-serif;
			font-weight: 700;
			font-size: 0.95rem;
			letter-spacing: 0.06em;
			text-transform: uppercase;
			text-decoration: none;
			border: 1px solid transparent;
			cursor: pointer;
			transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
		}
		.btn:hover { transform: translateY(-1px); }
		.btn-primary {
			background: var(--accent);
			color: #140f06;
		}
		.btn-primary:hover { background: #e0b35c; }
		.btn-ghost {
			background: transparent;
			color: var(--ink);
			border-color: var(--line);
		}
		.btn-ghost:hover { border-color: rgba(212, 162, 76, 0.45); color: var(--accent); }
		.foot {
			position: relative;
			z-index: 1;
			margin-top: auto;
			padding-top: 48px;
			font-size: 12px;
			line-height: 1.65;
			color: #5a6a7a;
			letter-spacing: 0.02em;
		}
		.foot a { color: #8aa0b5; text-decoration: none; }
		.foot a:hover { color: var(--accent); }
		.foot .legal { display: block; }
		.foot .beian { display: inline-block; margin-top: 2px; }
		.foot .beian[hidden] { display: none; }
		#guest, #authed { display: none; }
		#guest.show, #authed.show { display: flex; }
	</style>
</head>
<body>

					<circle class="star dim" cx="1105" cy="95" r="1" style="--d:5.3s;--delay:2.7s"/>
					<circle class="star dim" cx="1160" cy="220" r="0.9" style="--d:7.2s;--delay:0.5s"/>
					<circle class="star" cx="90" cy="320" r="1.1" style="--d:5.5s;--delay:1.6s"/>
					<circle class="star dim" cx="175" cy="410" r="0.8" style="--d:6.2s;--delay:0.8s"/>
					<circle class="star warm" cx="255" cy="360" r="1.3" style="--d:4.3s;--delay:2.2s"/>

			</svg>
		</div>
		<div class="hero">
			<h1 class="brand"><span id="mw-land-tag" data-i18n="land.tag">机甲学院母港</span>MineWorld</h1>
			<p class="lede" data-i18n="land.lede">真机甲 · 真任务 · 可训练的遥操数据。进入母港大厅，或从门后打开仿真卡片。</p>
			<div class="ctas" id="guest">
				<a class="btn btn-primary" id="signin" href="/portal/login.html" data-i18n="land.signin">登录</a>
				<a class="btn btn-ghost" href="/portal/login.html?next=%2Fportal%2Fme.html" data-i18n="land.record">驾驶员档案</a>
			</div>
			<div class="ctas" id="authed">
				<a class="btn btn-primary" id="enter-hub" href="/" data-i18n="land.enter">进入母港</a>
				<a class="btn btn-ghost" href="/portal/me.html" data-i18n="land.profile">档案与排行</a>
			</div>
		</div>
		<footer class="foot">
			<span class="legal" id="mw-legal">© 2026 Bug Copyright 云端机甲学院</span>
			<a class="beian" id="mw-beian" href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer" hidden></a>
			 · <a href="/portal/admin.html">Admin</a>
		</footer>
	</main>
	<script>
	(function () {
		/* Optional deploy inject: window.MW_SITE = { tagZh, tagEn, legal, beianText, beianHref } */
		var site = window.MW_SITE || null;
		if (site && window.MW_I18N && window.MW_I18N.dict) {
			if (site.tagZh || site.tagEn) {
				window.MW_I18N.dict['land.tag'] = {
					zh: site.tagZh || window.MW_I18N.dict['land.tag'].zh,
					en: site.tagEn || window.MW_I18N.dict['land.tag'].en
				};
			}
		}
		if (site) {
			var legal = document.getElementById('mw-legal');
			if (legal && site.legal) {
				legal.textContent = site.legal;
			}
			var beian = document.getElementById('mw-beian');
			if (beian && site.beianText) {
				beian.textContent = site.beianText;
				if (site.beianHref) {
					beian.href = site.beianHref;
				}
				beian.hidden = false;
			}
		}
		if (window.MW_I18N) {
			window.MW_I18N.mountToggle(document.body);
		}
		const TOKEN_KEY = 'mw_auth_token';
		const params = new URLSearchParams(location.search);
		const nextRaw = params.get('next') || '/';
		const nextSafe = nextRaw.startsWith('/') ? nextRaw : '/';
		const gameNext =
			nextSafe === '/' ||
			nextSafe.indexOf('/?') === 0 ||
			(nextSafe.charAt(0) === '/' && nextSafe.indexOf('/portal') !== 0);
		const afterLogin = gameNext ? nextSafe : '/portal/me.html';

		document.getElementById('signin').href =
			'/portal/login.html?next=' + encodeURIComponent(afterLogin);

		const enter = document.getElementById('enter-hub');
		enter.href = gameNext ? nextSafe : '/';

		async function boot() {
			const token = localStorage.getItem(TOKEN_KEY);
			if (!token) {
				document.getElementById('guest').classList.add('show');
				return;
			}
			try {
				const r = await fetch('/api/platform/me', {
					headers: { Authorization: 'Bearer ' + token },
				});
				if (!r.ok) {
					localStorage.removeItem(TOKEN_KEY);
					document.getElementById('guest').classList.add('show');
					return;
				}
				document.getElementById('authed').classList.add('show');
			} catch (e) {
				document.getElementById('guest').classList.add('show');
			}
		}
		boot();
	})();
	</script>
</body>
</html>
